version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    groups:
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      tanstack:
        patterns:
          - '@tanstack/*'
      eslint:
        patterns:
          - eslint
          - '@eslint/*'
          - eslint-*
          - typescript-eslint
      i18n:
        patterns:
          - i18next
          - i18next-*
          - react-i18next
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: typescript
        versions:
          - '>=7.0.0'
      - dependency-name: '@types/node'
        versions:
          - '>=25.0.0'
      - dependency-name: antd
      - dependency-name: '@ant-design/icons'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: ci
