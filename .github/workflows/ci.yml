name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc -b

      - name: Locale parity
        run: bun run lang:check

      - name: Unit tests + coverage
        run: bun run test:cov

      - name: Upload coverage
        if: ${{ !cancelled() && env.HAS_CODECOV_TOKEN == 'true' }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Build
        run: bun run build

  changes:
    name: detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            app:
              - '!docs/**'
              - '!plans/**'
              - '!**/*.md'

  e2e:
    name: e2e (Playwright)
    needs: changes
    if: >-
      always() &&
      (
        (github.event_name == 'pull_request' && needs.changes.outputs.app == 'true') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run e2e
        run: bun run e2e
        env:
          COVERAGE: 'true'

      - name: Upload e2e coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-e2e/lcov.info
          flags: e2e
          fail_ci_if_error: false

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
