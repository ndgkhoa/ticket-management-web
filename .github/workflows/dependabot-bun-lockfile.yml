name: Dependabot bun lockfile

# Dependabot bumps package.json but can't regenerate Bun's lockfile, so every npm PR
# fails `bun install --frozen-lockfile`. This regenerates bun.lock on the PR branch and
# pushes it back. Pushing with a PAT (not GITHUB_TOKEN) is what lets the other checks
# re-run against the synced lockfile; without the PAT the step is skipped.
on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: ${{ github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      HAS_PAT: ${{ secrets.DEPENDABOT_LOCKFILE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7
        if: ${{ env.HAS_PAT == 'true' }}
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.DEPENDABOT_LOCKFILE_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.HAS_PAT == 'true' }}

      - name: Regenerate bun.lock
        if: ${{ env.HAS_PAT == 'true' }}
        run: bun install

      - name: Commit and push if the lockfile changed
        if: ${{ env.HAS_PAT == 'true' }}
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock already in sync."
            exit 0
          fi
          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "build(deps): sync bun.lock"
          git push
