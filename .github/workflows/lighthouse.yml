name: Lighthouse

on:
  pull_request:
    branches: [main, develop]

jobs:
  lighthouse:
    name: lighthouse budgets
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_PROJECT_REF != '' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build (supabase)
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_ENABLED: 'false'

      - name: Lighthouse CI
        run: bunx @lhci/cli@0.14.x autorun

      - name: Comment Lighthouse scores
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const dir = '.lighthouseci';
            if (!fs.existsSync(dir)) { core.info('No .lighthouseci dir; skipping comment.'); return; }
            const files = fs.readdirSync(dir).filter((f) => /^lhr-.*\.json$/.test(f));
            if (!files.length) { core.info('No LHR reports; skipping comment.'); return; }
            const byUrl = {};
            for (const f of files) {
              const lhr = JSON.parse(fs.readFileSync(`${dir}/${f}`, 'utf8'));
              const url = lhr.requestedUrl || lhr.finalDisplayedUrl || lhr.finalUrl;
              const cats = lhr.categories || {};
              const row = byUrl[url] || (byUrl[url] = { performance: [], accessibility: [], 'best-practices': [] });
              for (const key of Object.keys(row)) {
                const score = cats[key] && cats[key].score;
                if (typeof score === 'number') row[key].push(score);
              }
            }
            const median = (arr) => { if (!arr.length) return null; const s = [...arr].sort((a, b) => a - b); return s[Math.floor(s.length / 2)]; };
            const cell = (n, min) => { if (n == null) return '—'; const v = Math.round(n * 100); return `${v >= min ? '✅' : '⚠️'} ${v}`; };
            const pathname = (u) => { try { return new URL(u).pathname; } catch { return u; } };
            let rows = '';
            for (const [url, r] of Object.entries(byUrl)) {
              rows += `| \`${pathname(url)}\` | ${cell(median(r.performance), 90)} | ${cell(median(r.accessibility), 95)} | ${cell(median(r['best-practices']), 90)} |\n`;
            }
            const marker = '<!-- lighthouse-comment -->';
            const body = `${marker}\n## Lighthouse (desktop · median of 3 runs)\n\n`
              + `| Page | Performance | Accessibility | Best Practices |\n|---|---|---|---|\n${rows}\n`
              + `<sub>Accessibility is a hard gate (≥ 95); performance & best-practices warn (≥ 90).</sub>`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            if (!issue_number) return;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
