# Codecov reports; it does not gate.
#
# Without this file Codecov applies its default `project` and `patch` statuses, and
# `patch` would fail nearly every PR: coverage sits at ~8% because most of src/ is
# legacy screens due for replacement, so almost any diff looks under-covered. That
# would leave two gates disagreeing about the same number — and the one people would
# learn to override is the one that is wrong more often.
#
# The real gate is the coverage floor in vitest.config.ts, which fails the build. This
# file exists so Codecov stays a dashboard until the ratio is worth enforcing.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Two coverage sources, uploaded under separate flags and combined by Codecov: `unit` from
# Vitest (logic) and `e2e` from Playwright (the UI/flows Vitest's V8 can't see). Together they
# reflect the app's real coverage. `carryforward` keeps a flag's last value on commits that did
# not upload it — e.g. a docs-only PR that skips the e2e job.
flags:
  unit:
    paths:
      - src/
    carryforward: true
  e2e:
    paths:
      - src/
    carryforward: true

comment:
  # Only comment when a PR actually moves coverage; otherwise it is noise on every PR.
  require_changes: true
