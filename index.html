<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback title only: pages set their own via React 19's native metadata. -->
    <title>Ticket Management</title>
    <!--
      Set the theme class before React paints. A Vite SPA renders this HTML first, so
      without this a reload in dark mode flashes light while the JS loads and the
      ThemeProvider mounts. Reads the same `vite-ui-theme` key the provider persists
      to, resolving `system` against the OS. Wrapped in try/catch so a blocked
      localStorage can never keep the app from rendering.
    -->
    <script>
      (function () {
        try {
          var choice = localStorage.getItem('vite-ui-theme') || 'system';
          var dark =
            choice === 'dark' ||
            (choice === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* no stored preference — default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
